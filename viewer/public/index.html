<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Proof Tablet Viewer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Menlo', 'Monaco', 'Courier New', monospace; font-size: 13px; background: #1a1a2e; color: #e0e0e0; display: flex; flex-direction: column; height: 100vh; }

header { background: #16213e; padding: 8px 16px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #333; }
header h1 { font-size: 14px; color: #8be9fd; }
header .header-meta { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
header .status { color: #6272a4; font-size: 12px; }
header .activity { color: #f1fa8c; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.main { display: flex; flex: 1; overflow: hidden; }

.dag-pane { flex: 1; overflow: auto; padding: 16px; position: relative; }
.detail-pane { width: 420px; border-left: 1px solid #333; overflow-y: auto; padding: 16px; background: #0f0f23; }
.detail-toolbar { display: flex; gap: 8px; margin-bottom: 12px; }
.detail-toggle { padding: 6px 10px; border: 1px solid #334; background: #161b33; color: #8be9fd; border-radius: 6px; cursor: pointer; font-size: 11px; text-transform: uppercase; }
.detail-toggle.active { background: #24345f; border-color: #8be9fd; color: #ffffff; }
.detail-pane h2 { font-size: 14px; color: #8be9fd; margin-bottom: 8px; }
.detail-pane .field { margin-bottom: 12px; }
.detail-pane .field-label { color: #6272a4; font-size: 11px; text-transform: uppercase; margin-bottom: 4px; }
.detail-pane .field-value { white-space: pre-wrap; word-wrap: break-word; font-size: 12px; line-height: 1.5; }
.detail-pane .collapsible { max-height: 120px; overflow: hidden; position: relative; cursor: pointer; }
.detail-pane .collapsible.expanded { max-height: none; }
.detail-pane .collapsible::after { content: '▼ click to expand'; display: block; text-align: center; color: #6272a4; font-size: 10px; padding: 4px; background: linear-gradient(transparent, #0f0f23); position: absolute; bottom: 0; left: 0; right: 0; }
.detail-pane .collapsible.expanded::after { content: '▲ click to collapse'; position: static; background: none; }

.feedback-panel { background: #1e1e3a; border: 1px solid #f1fa8c; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
.feedback-panel h3 { color: #f1fa8c; font-size: 13px; margin-bottom: 8px; }
.feedback-panel textarea { width: 100%; height: 80px; background: #0f0f23; color: #e0e0e0; border: 1px solid #444; border-radius: 4px; padding: 8px; font-family: inherit; font-size: 12px; resize: vertical; }
.feedback-panel .btn { padding: 6px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; margin-right: 8px; margin-top: 8px; }
.feedback-panel .btn-approve { background: #50fa7b; color: #1a1a2e; }
.feedback-panel .btn-feedback { background: #f1fa8c; color: #1a1a2e; }
.feedback-panel .btn:hover { opacity: 0.8; }
.feedback-panel .msg { color: #8be9fd; font-size: 11px; margin-top: 6px; }
.chat-artifact { border: 1px solid #28314d; border-radius: 8px; margin-bottom: 12px; background: #14182d; overflow: hidden; }
.chat-artifact summary { list-style: none; cursor: pointer; padding: 10px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.chat-artifact summary::-webkit-details-marker { display: none; }
.chat-artifact summary::after { content: '▼'; color: #6272a4; font-size: 10px; flex-shrink: 0; }
.chat-artifact[open] summary::after { content: '▲'; }
.chat-artifact h3 { font-size: 12px; color: #f1fa8c; margin: 0; }
.chat-artifact-meta { color: #6272a4; font-size: 11px; }
.chat-artifact-body { padding: 0 10px 10px; }
.chat-entry { margin-bottom: 10px; }
.chat-entry-label { color: #6272a4; font-size: 11px; text-transform: uppercase; margin-bottom: 4px; }

.timeline { background: #16213e; padding: 8px 16px; border-top: 1px solid #333; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.timeline label { color: #6272a4; font-size: 12px; white-space: nowrap; }
.timeline input[type=range] { flex: 1; }
.timeline .cycle-info { color: #f1fa8c; font-size: 12px; min-width: 200px; }
.timeline .slot-labels { width: 100%; display: flex; justify-content: space-between; gap: 8px; color: #6272a4; font-size: 10px; line-height: 1.2; }
.timeline .slot-labels button { flex: 1; min-width: 0; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; background: transparent; border: none; color: inherit; font: inherit; cursor: pointer; padding: 2px 0; }
.timeline .slot-labels button.selected { color: #f1fa8c; }

/* DAG nodes */
svg { width: 100%; height: 100%; }
.node rect { stroke-width: 2; cursor: pointer; }
.node text { font-size: 11px; fill: #e0e0e0; pointer-events: none; }
.node .diff-easy { font-size: 9px; fill: #50fa7b !important; }
.node .diff-hard { font-size: 9px; fill: #ffb86c !important; }
.node.closed rect { fill: #1e3a5f; stroke: #4a9eff; }
.node.recursive-closed rect { fill: #1a3d2e; stroke: #50fa7b; }
.node.active rect { fill: #3d3500; stroke: #f1fa8c; }
.node.open rect { fill: #2a2a3d; stroke: #6272a4; }
.node.error rect { fill: #3d1a1a; stroke: #ff5555; }
.node.selected rect { stroke-width: 3; }
.node.correspondence-working rect { stroke: #f1fa8c !important; stroke-width: 3; }
.node.worker-working rect { stroke: #f1fa8c !important; stroke-width: 3; }
.edge { fill: none; stroke-width: 1.5; pointer-events: none; }
.edge.edge-failed { stroke: #444; }
.edge.edge-unknown { stroke: #a2a2a2; }
.edge.edge-nl-pass { stroke: #bd93f9; }
.edge.to-closed { stroke: #4a9eff; }
.edge.active { stroke-width: 3.5; }
.edge.soundness-working { stroke: #f1fa8c !important; stroke-width: 2.5; }
.edge.soundness-working.active { stroke-width: 3.5; }

/* Mobile: detail pane becomes a slide-up sheet */
@media (max-width: 768px) {
  body { font-size: 12px; }
  header { padding: 6px 10px; gap: 8px; flex-wrap: wrap; }
  header h1 { font-size: 13px; }
  header .status { font-size: 11px; }
  header .activity { font-size: 11px; white-space: normal; }

  .main { flex-direction: column; min-height: 0; }
  .dag-pane { flex: 1; padding: 8px; overflow: hidden; touch-action: none; min-height: 0; }
  .detail-pane {
    width: 100%; border-left: none; border-top: 1px solid #333;
    max-height: 45vh; overflow-y: auto; padding: 12px;
    display: none;
  }
  .detail-pane.mobile-open { display: block; }
  .detail-pane .collapsible { max-height: 80px; }

  .timeline { padding: 6px 10px; gap: 8px; flex-wrap: wrap; order: -1; border-top: none; border-bottom: 1px solid #333; flex-shrink: 0; }
  .timeline .cycle-info { min-width: 0; font-size: 11px; }

  .feedback-panel textarea { height: 60px; font-size: 11px; }
  .feedback-panel .btn { padding: 8px 16px; font-size: 13px; }

  /* Larger tap targets for nodes */
  .node rect { stroke-width: 2.5; }

  /* Close button for detail sheet */
  .detail-close { display: block; text-align: right; color: #6272a4; font-size: 20px; cursor: pointer; padding: 0 4px 4px; }
}
@media (min-width: 769px) {
  .detail-close { display: none; }
}
</style>
</head>
<body>

<header>
  <h1>Proof Tablet Viewer</h1>
  <div class="header-meta">
    <div class="status" id="header-status">Loading...</div>
    <div class="activity" id="header-activity">Current activity: loading...</div>
  </div>
</header>

<div class="main">
  <div class="dag-pane" id="dag-pane">
    <svg id="dag-svg"></svg>
  </div>
  <div class="detail-pane" id="detail-pane">
    <div class="detail-close" onclick="document.getElementById('detail-pane').classList.remove('mobile-open')">✕</div>
    <div class="detail-toolbar">
      <button class="detail-toggle active" id="mode-node" onclick="setDetailMode('node')">Node</button>
      <button class="detail-toggle" id="mode-chat" onclick="setDetailMode('chat')">Chats</button>
    </div>
    <div id="feedback-container"></div>
    <div id="detail-content">
      <h2>Select a node</h2>
      <p style="color:#6272a4">Tap a node in the DAG to see details.</p>
    </div>
  </div>
</div>

<div class="timeline">
  <label>Cycle:</label>
  <input type="range" id="cycle-slider" min="0" max="0" value="0">
  <div class="cycle-info" id="cycle-info">Current</div>
  <div class="slot-labels" id="timeline-slot-labels"></div>
</div>

<script>
// Dagre-lite: simple topological layered layout
function layoutDAG(nodes, edges) {
  // Topological sort (Kahn's)
  const inDeg = {};
  const adj = {};
  for (const n of Object.keys(nodes)) { inDeg[n] = 0; adj[n] = []; }
  for (const [from, to] of edges) {
    if (adj[to]) adj[to].push(from);
    if (inDeg[from] !== undefined) inDeg[from]++;
  }

  // Assign layers (longest path from leaves)
  const layer = {};
  const queue = Object.keys(nodes).filter(n => inDeg[n] === 0);
  for (const n of queue) layer[n] = 0;

  const visited = new Set();
  const order = [];
  const q = [...queue];
  while (q.length) {
    const n = q.shift();
    if (visited.has(n)) continue;
    visited.add(n);
    order.push(n);
    for (const child of (adj[n] || [])) {
      layer[child] = Math.max(layer[child] || 0, (layer[n] || 0) + 1);
      inDeg[child]--;
      if (inDeg[child] <= 0) q.push(child);
    }
  }

  // Handle unvisited nodes
  for (const n of Object.keys(nodes)) {
    if (!visited.has(n)) { layer[n] = 0; order.push(n); }
  }

  // Group by layer
  const layers = {};
  for (const [n, l] of Object.entries(layer)) {
    if (!layers[l]) layers[l] = [];
    layers[l].push(n);
  }

  // Position
  const nodeW = 180, nodeH = 40, padX = 40, padY = 60;
  const positions = {};
  const maxLayer = Math.max(...Object.keys(layers).map(Number));

  for (let l = 0; l <= maxLayer; l++) {
    const nodesInLayer = layers[l] || [];
    const totalW = nodesInLayer.length * (nodeW + padX) - padX;
    let x = -totalW / 2;
    for (const n of nodesInLayer) {
      positions[n] = { x: x + nodeW / 2, y: l * (nodeH + padY) };
      x += nodeW + padX;
    }
  }

  return positions;
}

let allNodes = {}, allCycles = [], timelineSlots = [], selectedNode = null, hoveredNode = null, currentState = {}, liveState = {}, detailMode = 'node', timelineUpdateSeq = 0, chatRenderSeq = 0;

function activeNodeNames(kind) {
  return Object.entries(allNodes)
    .filter(([, node]) => !!(node.activity && node.activity[kind]))
    .map(([name]) => name);
}

function summarizeNames(names, limit = 3) {
  if (!names.length) return '';
  if (names.length <= limit) return names.join(', ');
  return `${names.slice(0, limit).join(', ')} +${names.length - limit} more`;
}

function currentActivityText() {
  const meta = currentState?.meta || {};
  const state = currentState?.state || {};
  const corr = activeNodeNames('correspondence');
  const sound = activeNodeNames('soundness');
  const review = activeNodeNames('reviewer');
  const worker = activeNodeNames('worker');

  if (corr.length) return `Current activity: correspondence verification on ${summarizeNames(corr)}`;
  if (sound.length) return `Current activity: NL proof soundness on ${summarizeNames(sound)}`;
  if (review.length) return `Current activity: reviewer decision on ${summarizeNames(review)}`;
  if (worker.length) return `Current activity: worker edits on ${summarizeNames(worker)}`;

  if (meta.source === 'worker') return 'Current activity: worker burst';
  if (meta.source === 'verification') return 'Current activity: verification';
  if (meta.source === 'reviewer') return 'Current activity: reviewer decision';
  if (meta.source === 'invalid') return 'Current activity: invalid attempt review';
  if (meta.source === 'cycle' || meta.source === 'git') return 'Current activity: committed cycle snapshot';
  if (state.awaiting_human_input) return 'Current activity: awaiting human input';
  return 'Current activity: idle';
}

function renderHeader() {
  const liveCycle = currentState.meta?.in_flight_cycle ?? currentState.state?.cycle ?? '?';
  document.getElementById('header-status').textContent =
    `Cycle ${liveCycle} | Phase: ${currentState.state.phase} | ${Object.values(allNodes).filter(n => n.status === 'closed').length}/${Object.keys(allNodes).length} closed`;
  document.getElementById('header-activity').textContent = currentActivityText();
}

function liveCycleNumber() {
  return liveState?.meta?.in_flight_cycle ?? liveState?.state?.cycle ?? currentState?.meta?.in_flight_cycle ?? currentState?.state?.cycle ?? '?';
}

function appBasePath() {
  const path = (window.location.pathname || '/').replace(/\/index\.html$/, '');
  if (!path || path === '/') return '';
  return path.endsWith('/') ? path.slice(0, -1) : path;
}

function apiPath(rel) {
  return `${appBasePath()}/api/${rel}`.replace(/^\/\//, '/');
}

async function fetchViewerState(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${url} -> ${res.status}`);
  return res.json();
}

async function fetchData() {
  try {
    const [viewerRes, cyclesRes] = await Promise.all([
      fetchViewerState(apiPath('viewer-state.json')),
      fetch(apiPath('cycles.json')).then(async r => {
        if (!r.ok) throw new Error(`cycles.json -> ${r.status}`);
        return r.json();
      }),
    ]);
    allNodes = viewerRes.nodes || {};
    liveState = viewerRes;
    currentState = viewerRes;
    allCycles = cyclesRes;
    renderHeader();

    // Setup slider
    const slider = document.getElementById('cycle-slider');
    const cycleNums = Array.from(new Set(allCycles.map(c => c.cycle))).sort((a, b) => a - b);
    timelineSlots = [...cycleNums, 'current'];
    slider.min = 0;
    slider.max = Math.max(timelineSlots.length - 1, 0);
    slider.value = slider.max;
    renderTimelineSlotLabels();
    updateCycleInfo();

    renderDAG();
    renderFeedbackPanel();
    renderCurrentDetail();
  } catch (err) {
    document.getElementById('header-status').textContent = `Viewer load failed: ${err.message}`;
    document.getElementById('header-activity').textContent = 'Current activity: unavailable';
    console.error(err);
  }
}

function isRecursivelyClosed(name, nodes) {
  const node = nodes[name];
  if (!node || node.status !== 'closed') return false;
  for (const imp of (node.imports || [])) {
    if (!isRecursivelyClosed(imp, nodes)) return false;
  }
  return true;
}

function getNodeClass(name, nodes) {
  const node = nodes[name];
  if (!node) return 'open';
  if (currentState.state.active_node === name) return 'active';
  if (isRecursivelyClosed(name, nodes)) return 'recursive-closed';
  if (node.status === 'closed') return 'closed';
  return 'open';
}

function getWorkerFocusName() {
  const state = currentState?.state || {};
  const meta = currentState?.meta || {};
  if (meta.source !== 'worker') return '';
  if (state.phase === 'theorem_stating') return state.theorem_soundness_target || '';
  if (state.phase === 'proof_formalization') return state.active_node || '';
  return '';
}

function renderDAG() {
  const svg = document.getElementById('dag-svg');
  svg.innerHTML = '';

  const names = Object.keys(allNodes);
  if (!names.length) return;

  // Build edges: child -> parent (import direction)
  const edges = [];
  for (const [name, node] of Object.entries(allNodes)) {
    for (const imp of (node.imports || [])) {
      if (allNodes[imp]) edges.push([name, imp]); // name depends on imp
    }
  }

  const positions = layoutDAG(allNodes, edges);

  // Shift to positive coordinates
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const p of Object.values(positions)) {
    minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
    maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y);
  }
  const offX = -minX + 120, offY = -minY + 40;
  for (const p of Object.values(positions)) { p.x += offX; p.y += offY; }

  svg.setAttribute('viewBox', `0 0 ${maxX - minX + 280} ${maxY - minY + 120}`);

  const ns = 'http://www.w3.org/2000/svg';
  const workerFocusName = getWorkerFocusName();

  // Arrow marker
  const defs = document.createElementNS(ns, 'defs');
  const marker = document.createElementNS(ns, 'marker');
  marker.setAttribute('id', 'arrow'); marker.setAttribute('viewBox', '0 0 10 10');
  marker.setAttribute('refX', '10'); marker.setAttribute('refY', '5');
  marker.setAttribute('markerWidth', '8'); marker.setAttribute('markerHeight', '8');
  marker.setAttribute('orient', 'auto-start-reverse');
  const arrowPath = document.createElementNS(ns, 'path');
  arrowPath.setAttribute('d', 'M 0 0 L 10 5 L 0 10 z');
  arrowPath.setAttribute('fill', 'context-stroke');
  marker.appendChild(arrowPath); defs.appendChild(marker); svg.appendChild(defs);

  // Draw edges — style encodes soundness status of the importing (from) node.
  // Since dependencies sit above their importers in the layered layout, draw
  // each edge from the top of the lower node to the bottom of the upper node
  // so the arrowhead remains visible outside the target box.
  for (const [from, to] of edges) {
    const p1 = positions[from], p2 = positions[to];
    if (!p1 || !p2) continue;
    const fromNode = allNodes[from];
    const soundnessWorking = !!fromNode?.activity?.soundness;
    const proofStatus = fromNode?.verification?.nl_proof || '?';
    const edgeStatusClass =
      allNodes[from]?.status === 'closed' ? ' to-closed' :
      (proofStatus === 'pass' ? ' edge-nl-pass' :
       (proofStatus === 'fail' || proofStatus === 'structural' ? ' edge-failed' : ' edge-unknown'));
    const line = document.createElementNS(ns, 'line');
    line.setAttribute('x1', p1.x); line.setAttribute('y1', p1.y - 20);
    line.setAttribute('x2', p2.x); line.setAttribute('y2', p2.y + 20);
    line.setAttribute(
      'class',
      'edge'
      + edgeStatusClass
      + (soundnessWorking ? ' soundness-working' : '')
    );
    line.setAttribute('marker-end', 'url(#arrow)');
    line.dataset.from = from;
    line.dataset.to = to;
    svg.appendChild(line);
  }

  // Draw nodes
  for (const [name, pos] of Object.entries(positions)) {
    const node = allNodes[name];
    if (!node) continue;
    const cls = getNodeClass(name, allNodes);

    const g = document.createElementNS(ns, 'g');
    const diffCls = (node.difficulty === 'easy') ? 'easy' : 'hard';
    g.setAttribute(
      'class',
      `node ${cls} ${diffCls}`
      + (selectedNode === name ? ' selected' : '')
      + (workerFocusName === name ? ' worker-working' : '')
      + (node.activity?.correspondence ? ' correspondence-working' : '')
    );
    g.setAttribute('transform', `translate(${pos.x - 90}, ${pos.y - 20})`);
    g.style.cursor = 'pointer';
    g.onclick = () => selectNode(name);
    g.onmouseenter = () => {
      hoveredNode = name;
      updateEdgeEmphasis();
    };
    g.onmouseleave = () => {
      if (hoveredNode === name) hoveredNode = null;
      updateEdgeEmphasis();
    };

    const rect = document.createElementNS(ns, 'rect');
    rect.setAttribute('width', 180); rect.setAttribute('height', 40);
    const cornerR = (node.difficulty === 'easy') ? 12 : 0;
    rect.setAttribute('rx', cornerR); rect.setAttribute('ry', cornerR);
    g.appendChild(rect);

    // Difficulty label above the name
    const diff = node.difficulty || '';
    if (diff) {
      const diffText = document.createElementNS(ns, 'text');
      diffText.setAttribute('x', 90); diffText.setAttribute('y', 13);
      diffText.setAttribute('text-anchor', 'middle');
      diffText.setAttribute('class', diff === 'easy' ? 'diff-easy' : 'diff-hard');
      diffText.textContent = diff === 'easy' ? 'easy' : 'hard';
      g.appendChild(diffText);
    }

    // Label: title or name, truncated
    const theoremLike = ['theorem', 'corollary', 'proposition'].includes(node.texEnv);
    const definitionLike = node.texEnv === 'definition' || (node.leanContent || '').match(/^(noncomputable\s+)?def\s/m);
    const kindPrefix = node.kind === 'preamble' ? '' :
      definitionLike ? 'D: ' :
      (node.kind === 'paper_main_result' || theoremLike) ? 'T: ' : 'L: ';
    const label = (kindPrefix + (node.title || name)).substring(0, 26);
    const text = document.createElementNS(ns, 'text');
    text.setAttribute('x', 90); text.setAttribute('y', diff ? 28 : 24);
    text.setAttribute('text-anchor', 'middle');
    text.textContent = label;
    g.appendChild(text);

    // Node border style encodes correspondence status
    const verif = node.verification || {};
    const corrStatus = node.kind === 'preamble' ? 'pass' : (verif.correspondence || '?');
    if (corrStatus === 'fail') rect.setAttribute('stroke-dasharray', '2 3');       // dotted
    else if (corrStatus === '?') rect.setAttribute('stroke-dasharray', '8 4');     // dashed
    // else solid (no dasharray)
    svg.appendChild(g);
  }

  updateEdgeEmphasis();
}

function selectNode(name) {
  selectedNode = name;
  // Preserve current viewBox before re-render
  const svg = document.getElementById('dag-svg');
  const savedVB = svg.getAttribute('viewBox');
  renderDAG();
  if (savedVB) svg.setAttribute('viewBox', savedVB);
  renderCurrentDetail();
  // Open mobile detail sheet
  document.getElementById('detail-pane').classList.add('mobile-open');
}

function updateEdgeEmphasis() {
  const active = hoveredNode || selectedNode;
  document.querySelectorAll('#dag-svg .edge').forEach(edge => {
    const dependencyEdge = active && edge.dataset.from === active;
    edge.classList.toggle('active', !!dependencyEdge);
  });
}

function renderNodeDetail(name) {
  const pane = document.getElementById('detail-content');
  const node = allNodes[name];
  if (!node) { pane.innerHTML = '<h2>Node not found</h2>'; return; }

  const statusColor = {
    'closed': '#4a9eff',
    'open': '#6272a4',
  }[node.status] || '#6272a4';

  pane.innerHTML = `
    <h2 style="color:${statusColor}">${node.title || name}</h2>
    <div class="field">
      <div class="field-label">Name</div>
      <div class="field-value">${name}</div>
    </div>
    <div class="field">
      <div class="field-label">Status</div>
      <div class="field-value" style="color:${statusColor}">${node.status} (${node.kind})</div>
    </div>
    <div class="field">
      <div class="field-label">Imports</div>
      <div class="field-value">${(node.imports || []).join(', ') || 'none'}</div>
    </div>
    <div class="field">
      <div class="field-label">Difficulty</div>
      <div class="field-value">${node.difficulty || '?'}</div>
    </div>
    <div class="field">
      <div class="field-label">Sorry</div>
      <div class="field-value">${node.hasSorry ? '⚠ yes' : '✓ no'}</div>
    </div>
    ${node.verification ? `<div class="field">
      <div class="field-label">Verification</div>
      <div class="field-value">${
        (node.verification.correspondence === 'fail' ? '<span style="color:#ff5555">Correspondence: FAIL</span>' :
         node.verification.correspondence === 'pass' ? '<span style="color:#50fa7b">Correspondence: PASS</span>' : 'Correspondence: ?') +
        '<br>' +
        (node.verification.nl_proof === 'structural' ? '<span style="color:#ff5555">NL Proof: STRUCTURAL</span>' :
         node.verification.nl_proof === 'fail' ? '<span style="color:#ff5555">NL Proof: FAIL</span>' :
         node.verification.nl_proof === 'pass' ? '<span style="color:#50fa7b">NL Proof: PASS</span>' : 'NL Proof: ?')
      }</div>
      ${node.verification.correspondence_issue ? `<div class="field-value collapsible" onclick="this.classList.toggle('expanded')" style="color:#ff5555;font-size:11px;margin-top:4px">${escHtml(node.verification.correspondence_issue)}</div>` : ''}
      ${node.verification.nl_proof_issue ? `<div class="field-value collapsible" onclick="this.classList.toggle('expanded')" style="color:#ff5555;font-size:11px;margin-top:4px">${escHtml(node.verification.nl_proof_issue)}</div>` : ''}
    </div>` : ''}
    <div class="field">
      <div class="field-label">Lean Declaration</div>
      <div class="field-value" style="color:#f8f8f2">${escHtml(node.declaration || '(none)')}</div>
    </div>
    <div class="field">
      <div class="field-label">NL Content (.tex)</div>
      <div class="field-value collapsible" onclick="this.classList.toggle('expanded')">${escHtml(node.texContent || '(none)')}</div>
    </div>
    <div class="field">
      <div class="field-label">Lean Proof</div>
      <div class="field-value collapsible" onclick="this.classList.toggle('expanded')">${escHtml(node.leanContent || '(none)')}</div>
    </div>
  `;
}

function selectedTimelineSlot() {
  const slider = document.getElementById('cycle-slider');
  const idx = parseInt(slider.value || '0', 10);
  return timelineSlots[idx];
}

function renderTimelineSlotLabels() {
  const container = document.getElementById('timeline-slot-labels');
  if (!container) return;
  const selected = selectedTimelineSlot();
  container.innerHTML = timelineSlots.map((slot, idx) => {
    const label = slot === 'current' ? `Live ${liveCycleNumber()}` : `Cycle ${slot}`;
    const cls = slot === selected ? 'selected' : '';
    return `<button type="button" class="${cls}" onclick="selectTimelineSlot(${idx})">${escHtml(label)}</button>`;
  }).join('');
}

function selectTimelineSlot(idx) {
  const slider = document.getElementById('cycle-slider');
  slider.value = String(idx);
  updateCycleInfo();
}

async function renderChatDetail() {
  const pane = document.getElementById('detail-content');
  pane.innerHTML = '<h2>Chats</h2><p style="color:#6272a4">Loading chat history...</p>';
  const slot = selectedTimelineSlot();
  const url = slot === 'current' ? apiPath('chats.json') : apiPath(`chats-at/${slot}.json`);
  const seq = ++chatRenderSeq;
  try {
    const data = await fetchViewerState(url);
    if (seq !== chatRenderSeq) return;
    const title = slot === 'current' ? `Current Cycle ${data.cycle || '?'}` : `Cycle ${slot}`;
    if (!data.artifacts || !data.artifacts.length) {
      pane.innerHTML = `<h2>${title} Chats</h2><p style="color:#6272a4">No chats recorded for this cycle yet.</p>`;
      return;
    }
    pane.innerHTML = `<h2>${title} Chats</h2>` + data.artifacts.map(artifact => `
      <details class="chat-artifact">
        <summary>
          <h3>${escHtml(artifact.title || artifact.id || 'Chat')}</h3>
          <span class="chat-artifact-meta">${artifact.entries && artifact.entries.length ? `${artifact.entries.length} entr${artifact.entries.length === 1 ? 'y' : 'ies'}` : 'No entries yet'}</span>
        </summary>
        <div class="chat-artifact-body">
          ${artifact.entries && artifact.entries.length ? artifact.entries.map(entry => `
            <div class="chat-entry">
              <div class="chat-entry-label">${escHtml(entry.title || entry.role || entry.kind || 'Entry')}</div>
              <div class="field-value collapsible" onclick="this.classList.toggle('expanded')">${escHtml(entry.text || '')}</div>
            </div>
          `).join('') : '<p style="color:#6272a4">No visible exchanges yet.</p>'}
        </div>
      </details>
    `).join('');
  } catch (err) {
    if (seq !== chatRenderSeq) return;
    pane.innerHTML = `<h2>Chats</h2><p style="color:#ff5555">${escHtml(err.message || String(err))}</p>`;
  }
}

function renderCurrentDetail() {
  document.getElementById('mode-node').classList.toggle('active', detailMode === 'node');
  document.getElementById('mode-chat').classList.toggle('active', detailMode === 'chat');
  if (detailMode === 'chat') {
    renderChatDetail();
    return;
  }
  if (selectedNode) {
    renderNodeDetail(selectedNode);
    return;
  }
  document.getElementById('detail-content').innerHTML = `
    <h2>Select a node</h2>
    <p style="color:#6272a4">Tap a node in the DAG to see details.</p>
  `;
}

function setDetailMode(mode) {
  detailMode = mode === 'chat' ? 'chat' : 'node';
  renderCurrentDetail();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function updateCycleInfo() {
  const slider = document.getElementById('cycle-slider');
  const idx = parseInt(slider.value);
  const slot = timelineSlots[idx];
  const info = document.getElementById('cycle-info');
  const isLatest = slot === 'current';
  const seq = ++timelineUpdateSeq;
  renderTimelineSlotLabels();

  if (isLatest) {
    // Show current live state
    const liveCycle = liveCycleNumber();
    info.textContent = `Current (live, cycle ${liveCycle})`;
    const live = await fetchViewerState(apiPath('viewer-state.json'));
    if (seq !== timelineUpdateSeq) return;
    liveState = live;
    allNodes = live.nodes || {};
    currentState = live;
    renderTimelineSlotLabels();
    renderHeader();
    renderDAG();
    renderCurrentDetail();
    return;
  }

  const val = slot;
  const cycle = allCycles.find(c => c.cycle === val);
  if (cycle) {
    info.textContent = `Cycle ${val}: ${cycle.phase || '?'} | ${cycle.outcome || '?'}`;
  } else {
    info.textContent = `Cycle ${val}`;
  }

  // Load historical state from git
  try {
    const resp = await fetch(apiPath(`state-at/${val}.json`));
    if (seq !== timelineUpdateSeq) return;
    if (resp.ok) {
      const data = await resp.json();
      if (seq !== timelineUpdateSeq) return;
      allNodes = data.nodes || {};
      currentState = data;
      renderHeader();
      const svg = document.getElementById('dag-svg');
      const savedVB = svg.getAttribute('viewBox');
      renderDAG();
      if (savedVB) svg.setAttribute('viewBox', savedVB);
      renderCurrentDetail();
    }
  } catch {}
}

document.getElementById('cycle-slider').addEventListener('input', updateCycleInfo);

function renderFeedbackPanel() {
  const container = document.getElementById('feedback-container');
  const phase = currentState?.state?.phase || '';
  const lastReview = currentState?.state?.last_review || {};
  const decision = lastReview.decision || '';
  const stopped = !currentState?.state?.cycle; // crude check

  // Show feedback panel only when the supervisor is awaiting human input
  const awaiting = currentState?.state?.awaiting_human_input || false;
  if (awaiting || decision === 'NEED_INPUT' || decision === 'ADVANCE_PHASE') {
    const downloadUrl = apiPath('download-tablet');
    // On mobile, auto-open the detail pane when feedback is needed
    document.getElementById('detail-pane').classList.add('mobile-open');
    container.innerHTML = `
      <div class="feedback-panel">
        <h3>Human Review (${phase})</h3>
        <p style="color:#6272a4; font-size:11px; margin-bottom:8px">
          ${decision === 'ADVANCE_PHASE' ? 'Reviewer wants to advance. Approve or give feedback.' :
            decision === 'NEED_INPUT' ? 'Reviewer requested human input.' :
            'Review the tablet structure and provide feedback.'}
        </p>
        <p style="margin-bottom:8px"><a href="${downloadUrl}" style="color:#8be9fd; font-size:12px">Download tablet snapshot (.zip)</a></p>
        <textarea id="feedback-text" placeholder="Enter feedback for the worker (or leave empty to approve)..."></textarea>
        <div>
          <button class="btn btn-approve" onclick="submitFeedback('approve')">✓ Approve & Advance</button>
          <button class="btn btn-feedback" onclick="submitFeedback('feedback')">↩ Send Feedback</button>
        </div>
        <div class="msg" id="feedback-msg"></div>
      </div>
    `;
  } else {
    container.innerHTML = '';
  }
}

async function submitFeedback(action) {
  const text = document.getElementById('feedback-text')?.value || '';
  const msg = document.getElementById('feedback-msg');
  try {
    const resp = await fetch(apiPath('feedback'), {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ action, feedback: text }),
    });
    const data = await resp.json();
    if (msg) msg.textContent = data.message || data.error || 'Done';
  } catch (e) {
    if (msg) msg.textContent = 'Error: ' + e.message;
  }
}

// --- Pan & zoom for DAG ---
(function() {
  const svgEl = document.getElementById('dag-svg');
  const pane = document.getElementById('dag-pane');
  let viewBox = { x: 0, y: 0, w: 800, h: 600 };
  let isPanning = false, startPt = null, startVB = null;
  let lastPinchDist = 0;

  function updateViewBox() {
    svgEl.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
  }

  // Observe when DAG re-renders to capture the initial viewBox
  const observer = new MutationObserver(() => {
    const vb = svgEl.getAttribute('viewBox');
    if (vb) {
      const [x, y, w, h] = vb.split(' ').map(Number);
      if (w > 0 && h > 0) { viewBox = { x, y, w, h }; }
    }
  });
  observer.observe(svgEl, { attributes: true, attributeFilter: ['viewBox'] });

  // Mouse wheel zoom
  pane.addEventListener('wheel', (e) => {
    e.preventDefault();
    const scale = e.deltaY > 0 ? 1.1 : 0.9;
    const rect = svgEl.getBoundingClientRect();
    const mx = (e.clientX - rect.left) / rect.width;
    const my = (e.clientY - rect.top) / rect.height;
    const newW = viewBox.w * scale, newH = viewBox.h * scale;
    viewBox.x += (viewBox.w - newW) * mx;
    viewBox.y += (viewBox.h - newH) * my;
    viewBox.w = newW; viewBox.h = newH;
    updateViewBox();
  }, { passive: false });

  // Mouse drag pan
  pane.addEventListener('mousedown', (e) => {
    if (e.target.closest('.node')) return; // don't pan when clicking nodes
    isPanning = true;
    startPt = { x: e.clientX, y: e.clientY };
    startVB = { ...viewBox };
    pane.style.cursor = 'grabbing';
  });
  window.addEventListener('mousemove', (e) => {
    if (!isPanning) return;
    const rect = svgEl.getBoundingClientRect();
    const dx = (e.clientX - startPt.x) / rect.width * viewBox.w;
    const dy = (e.clientY - startPt.y) / rect.height * viewBox.h;
    viewBox.x = startVB.x - dx;
    viewBox.y = startVB.y - dy;
    updateViewBox();
  });
  window.addEventListener('mouseup', () => { isPanning = false; pane.style.cursor = ''; });

  // Touch: pinch zoom + pan
  function pinchDist(touches) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }
  function touchCenter(touches) {
    return {
      x: (touches[0].clientX + touches[1].clientX) / 2,
      y: (touches[0].clientY + touches[1].clientY) / 2,
    };
  }

  pane.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1 && !e.target.closest('.node')) {
      isPanning = true;
      startPt = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      startVB = { ...viewBox };
    } else if (e.touches.length === 2) {
      isPanning = false;
      lastPinchDist = pinchDist(e.touches);
      startVB = { ...viewBox };
    }
  }, { passive: true });

  pane.addEventListener('touchmove', (e) => {
    if (e.touches.length === 1 && isPanning) {
      e.preventDefault();
      const rect = svgEl.getBoundingClientRect();
      const dx = (e.touches[0].clientX - startPt.x) / rect.width * startVB.w;
      const dy = (e.touches[0].clientY - startPt.y) / rect.height * startVB.h;
      viewBox.x = startVB.x - dx;
      viewBox.y = startVB.y - dy;
      updateViewBox();
    } else if (e.touches.length === 2) {
      e.preventDefault();
      const dist = pinchDist(e.touches);
      const scale = lastPinchDist / dist;
      const rect = svgEl.getBoundingClientRect();
      const c = touchCenter(e.touches);
      const mx = (c.x - rect.left) / rect.width;
      const my = (c.y - rect.top) / rect.height;
      const newW = startVB.w * scale, newH = startVB.h * scale;
      viewBox.x = startVB.x + (startVB.w - newW) * mx;
      viewBox.y = startVB.y + (startVB.h - newH) * my;
      viewBox.w = newW; viewBox.h = newH;
      updateViewBox();
    }
  }, { passive: false });

  pane.addEventListener('touchend', () => { isPanning = false; });
})();

// Auto-refresh every 30s
fetchData();
setInterval(fetchData, 30000);
